version: "3.8"

services:

  app-blue:
    image: virtualrcoder/python-ci-app:v1
    container_name: app-blue
    ports:
      - "5000:5000"

  app-green:
    image: virtualrcoder/python-ci-app:latest
    container_name: app-green
    ports:
      - "5001:5000"

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
